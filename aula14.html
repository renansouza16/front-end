<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tocando aúdios em HTML</title>
</head>
<body>
    <h1> Reproduzindo Áudio</h1>
    <p> Vamos aprender a reproduzir audios em HTML5</p>
    <audio src="BANDIDO QUER 67 RESENHA - DJ Michael (youtube).mp3" controls autoplay></audio>
    <!--MP3 WAV OGG-->
    <audio preload="metadata" autoplay controls loop>
    <source src="BANDIDO QUER 67 RESENHA - DJ Michael (youtube).mp3" type="audio/mpeg">
    <source src="BANDIDO-QUER-67-RESENHA-DJ-Michael-_youtube_.ogg" type="audio/ogg">
    <source src="BANDIDO-QUER-67-RESENHA-DJ-Michael-_youtube_.wav" type="audio/wav">
    <p>infelizmente o seu navegador não consegue reproduzir áudio. <a
    href="BANDIDO QUER 67 RESENHA - DJ Michael (youtube).mp3">Clique aqui para baixar o arquivo MP3</a>
    </p>
    </audio>
</body>
</html>
